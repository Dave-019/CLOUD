<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

  <title>Netflix raising prices again | My Feed</title>
  <link rel="stylesheet" type="text/css" href="../styles.css" media="screen" />
</head>
<body>
  <div class="post-page">

    <nav class="post-page-nav">
      <a href="/index.html">back</a>
   
    </nav>

    <h1>
    <a href="https://chandrahalim.com/netflix-raising-prices-again/"
        target="_blank"
        rel="noopener noreferrer"
        style="text-decoration-color: var(--accent); color: inherit;">
        Netflix raising prices again
    </a>
    </h1>

    <div class="post-content">
      <p>Netflix just got a $2.8 BILLION payout from Paramount for its failed Warner Bros. deal.</p>
<p>Then Netflix turned around and raised prices on millions of customers.</p>
<ul>
<li>Ad-tier: $7.99 → $8.99</li>
<li>Standard:  $17.99 → $19.99</li>
<li>Premium: $24.99 → $26.99</li>
</ul>
    </div>

  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      function wrapImage(img) {
        var wrapper = document.createElement('div');
        wrapper.className = 'img-wrapper';
        img.parentNode.insertBefore(wrapper, img);
        wrapper.appendChild(img);

        img.loading = 'lazy';

        function markLoaded() {
          wrapper.classList.add('loaded');
        }

        img.addEventListener('load', markLoaded);
        img.addEventListener('error', function () {
          markLoaded();
          img.style.display = 'none';
        });

        if (img.complete && img.naturalWidth > 0) {
          markLoaded();
        }
      }

      document.querySelectorAll('.post-content img').forEach(wrapImage);
    });
  </script>

</body>
</html>
