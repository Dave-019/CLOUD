    <div class="post-content">
      In a much earlier post I lamented the unavailability of Anita Brookner's contribution to the <i>100 Great Paintings</i> series (BBC, 1981). During the time I was away from the blog, the BBC reshowed the episode, and it has now found its way to YouTube:<div class="separator" style="clear: both; text-align: center;"></div>
    </div>

  </div>

  <script>
    window.addEventListener('DOMContentLoaded', function () {
      function wrapImage(img) {
        var wrapper = document.createElement('div');
        wrapper.className = 'img-wrapper';
        img.parentNode.insertBefore(wrapper, img);
        wrapper.appendChild(img);

        img.loading = 'lazy';

        function markLoaded() {
          wrapper.classList.add('loaded');
        }

        img.addEventListener('load', markLoaded);
        img.addEventListener('error', function () {
          markLoaded();
          img.style.display = 'none';
        });

        if (img.complete && img.naturalWidth > 0) {
          markLoaded();
        }
      }

      document.querySelectorAll('.post-content img').forEach(wrapImage);
    });
  </script>
